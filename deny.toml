# =============================================================================
# deny.toml -- cargo-deny configuration for ScorchKit
# =============================================================================
#
# Enforces license compliance, dependency advisories, and duplicate detection.
# Run: cargo deny check
#
# Install: cargo install cargo-deny
# =============================================================================

[graph]
targets = []

# =============================================================================
# [advisories] -- Security advisory database checks
# =============================================================================
[advisories]
ignore = []

# =============================================================================
# [licenses] -- License compliance
# =============================================================================
[licenses]
confidence-threshold = 0.8

allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
    "CDLA-Permissive-2.0",
]

exceptions = [
    { allow = ["ISC", "MIT", "OpenSSL"], name = "ring" },
]

# =============================================================================
# [bans] -- Dependency ban and duplicate detection
# =============================================================================
[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

# =============================================================================
# [sources] -- Crate source restrictions
# =============================================================================
[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
